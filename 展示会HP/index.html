<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SagaDigits – Company Profile</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0e2d;
    }

    .page-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: 54px;
      background: #0b0e2d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #0b0e2d;
    }
    .slide.active { display: flex; }

    canvas {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }

    .loading {
      color: rgba(255,255,255,0.4);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
    }

    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 54px;
      background: rgba(10,12,40,0.97);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      z-index: 999;
    }
    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn:active { background: #6c2fb5; }
    .nav-btn:disabled { opacity: 0.2; pointer-events: none; }
    .nav-dots { display: flex; gap: 10px; align-items: center; }
    .nav-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }
    .nav-dot.active { background: #8b3fd1; transform: scale(1.4); }
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="slide active" id="slide-0"><div class="loading">Loading...</div></div>
  <div class="slide"        id="slide-1"><div class="loading">Loading...</div></div>
  <div class="slide"        id="slide-2"><div class="loading">Loading...</div></div>
</div>

<nav class="nav-bar">
  <button class="nav-btn" id="btnPrev" disabled>‹</button>
  <div class="nav-dots">
    <div class="nav-dot active" onclick="goTo(0)"></div>
    <div class="nav-dot"        onclick="goTo(1)"></div>
    <div class="nav-dot"        onclick="goTo(2)"></div>
  </div>
  <button class="nav-btn" id="btnNext">›</button>
</nav>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const pdfs   = ['HP1.pdf', 'HP2.pdf', 'HP3.pdf'];
  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.nav-dot');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const total  = 3;
  let current  = 0;
  let startX = 0, startY = 0;

  async function renderPDF(url, slideEl) {
    const dpr    = Math.max(window.devicePixelRatio || 1, 3);
    const wrap   = document.querySelector('.page-wrap');
    const maxW   = wrap.clientWidth;
    const maxH   = wrap.clientHeight;

    const pdf    = await pdfjsLib.getDocument(url).promise;
    const page   = await pdf.getPage(1);
    const vp0    = page.getViewport({ scale: 1 });

    const scale  = Math.min(maxW / vp0.width, maxH / vp0.height);
    const vp     = page.getViewport({ scale: scale * dpr });

    const canvas = document.createElement('canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    canvas.style.width  = (vp.width  / dpr) + 'px';
    canvas.style.height = (vp.height / dpr) + 'px';

    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

    slideEl.innerHTML = '';
    slideEl.appendChild(canvas);
  }

  async function renderAll() {
    await renderPDF(pdfs[0], slides[0]);
    renderPDF(pdfs[1], slides[1]);
    renderPDF(pdfs[2], slides[2]);
  }

  window.addEventListener('load', renderAll);

  function goTo(n) {
    if (n < 0 || n >= total) return;
    slides[current].classList.remove('active');
    current = n;
    slides[current].classList.add('active');
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
    btnPrev.disabled = current === 0;
    btnNext.disabled = current === total - 1;
  }

  btnPrev.onclick = () => goTo(current - 1);
  btnNext.onclick = () => goTo(current + 1);

  const wrap = document.querySelector('.page-wrap');
  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      goTo(current + (dx < 0 ? 1 : -1));
    }
  }, { passive: true });
</script>
</body>
</html>
