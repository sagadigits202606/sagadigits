<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SagaDigits QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #0e1240 0%, #1a1560 50%, #0c1033 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
      padding: 32px 20px;
    }
    .logo-wrap { margin-bottom: 28px; text-align: center; }
    .logo-svg { height: 48px; width: auto; }
    .tagline { font-size: 13px; color: #9aa8cc; margin-top: 8px; letter-spacing: 0.5px; }

    .qr-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #qrcode canvas, #qrcode img { border-radius: 8px; }
    .scan-label {
      font-size: 13px;
      color: #555;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .url-box {
      margin-top: 22px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: #a78bfa;
      word-break: break-all;
      text-align: center;
      max-width: 320px;
    }
    .note {
      margin-top: 18px;
      font-size: 11.5px;
      color: #6677aa;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="download.png" alt="SagaDigits" class="logo-svg">
    <div class="tagline">Award-Winning AI Solutions</div>
  </div>

  <div class="qr-card">
    <div class="scan-label">SCAN TO VIEW PROFILE</div>
    <div id="qrcode"></div>
  </div>

  <div class="url-box">chic-elf-05495d.netlify.app</div>
  <div class="note">Scan the QR code with your smartphone camera</div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://chic-elf-05495d.netlify.app',
      width: 220,
      height: 220,
      colorDark: '#0c1033',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
